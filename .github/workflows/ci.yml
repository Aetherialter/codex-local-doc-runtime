name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: uv sync --dev

      - name: Set PyO3 Python
        shell: pwsh
        run: |
          $Python = (Resolve-Path .venv\Scripts\python.exe).Path
          $PythonBase = (& $Python -c "import sys; print(sys.base_prefix)").Trim()
          "PYO3_PYTHON=$Python" >> $env:GITHUB_ENV
          $PythonBase >> $env:GITHUB_PATH

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Rust format
        run: cargo fmt --check --manifest-path crates\docrt-core\Cargo.toml

      - name: Rust lint
        run: cargo clippy --manifest-path crates\docrt-core\Cargo.toml -- -D warnings

      - name: Rust test
        run: cargo test --manifest-path crates\docrt-core\Cargo.toml

      - name: Build Rust extension
        run: uv run maturin develop --manifest-path crates\docrt-core\Cargo.toml

      - name: Test
        run: uv run pytest

      - name: CLI smoke
        shell: pwsh
        run: |
          uv run docrt doctor --agent
          uv run docrt agent-config
          uv run docrt batch-fingerprint examples\fixtures\sample.docx examples\fixtures\sample.xlsx
          uv run docrt validate-task examples\tasks\xlsx-patch-verify.json
          uv run docrt explain-task examples\tasks\xlsx-patch-verify.json
          uv run docrt storage-report

      - name: Coverage smoke
        run: uv run pytest --cov=docrt
